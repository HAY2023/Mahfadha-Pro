name: Build Mahfadha Pro (Windows EXE)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Build Python CLI Bridge (mahfadha_bridge.exe)
        run: |
          cd cli-bridge
          python -m pip install --upgrade pip
          pip install pyinstaller pyserial
          pyinstaller --onefile --name mahfadha_bridge mahfadha_bridge.py
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          
      - name: Enable Windows Desktop in Flutter
        run: flutter config --enable-windows-desktop
        
      - name: Build Flutter App (mahfadha_companion.exe)
        run: |
          cd app
          flutter pub get
          flutter build windows --release
          
      - name: Prepare Final Output Folder
        run: |
          mkdir Mahfadha-Pro-Windows
          copy "app\build\windows\x64\runner\Release\*" "Mahfadha-Pro-Windows\"
          copy "cli-bridge\dist\mahfadha_bridge.exe" "Mahfadha-Pro-Windows\"
          
      - name: Upload EXE files as Artifact for Download
        uses: actions/upload-artifact@v3
        with:
          name: Mahfadha-Pro-Windows
          path: Mahfadha-Pro-Windows\*
