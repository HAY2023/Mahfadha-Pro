name: Build Mahfadha Pro (Windows EXE)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Build Python CLI Bridge (mahfadha_bridge.exe)
        run: |
          cd cli-bridge
          python -m pip install --upgrade pip
          pip install pyinstaller pyserial
          pyinstaller --onefile --name mahfadha_bridge mahfadha_bridge.py
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
          
      - name: Enable Windows Desktop in Flutter
        run: flutter config --enable-windows-desktop
        
      - name: Generate Windows Platform Files
        run: |
          cd app
          flutter create --platforms windows .
          
      - name: Build Flutter App
        run: |
          cd app
          flutter pub get
          flutter build windows --release

      - name: Prepare Installer Files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "installer\flutter-release"

          # Find the Release directory containing the built exe
          # Flutter outputs to: app\build\windows\x64\runner\Release\ (or without x64)
          $releaseDir = $null

          # Try x64 path first (newer Flutter versions)
          $x64Path = "app\build\windows\x64\runner\Release"
          if (Test-Path $x64Path) {
            $releaseDir = $x64Path
          } else {
            # Fallback to non-x64 path
            $legacyPath = "app\build\windows\runner\Release"
            if (Test-Path $legacyPath) {
              $releaseDir = $legacyPath
            }
          }

          if ($releaseDir) {
            Write-Host "Found Flutter release at: $releaseDir"
            # List contents for debugging
            Get-ChildItem $releaseDir | ForEach-Object { Write-Host "  -> $($_.Name)" }
            Copy-Item "$releaseDir\*" "installer\flutter-release\" -Recurse
          } else {
            Write-Host "ERROR: Could not find Flutter release directory!"
            Write-Host "Directory tree under app\build\windows:"
            Get-ChildItem -Path "app\build\windows" -Recurse -Directory | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }

          # Verify the main exe exists in the copied files
          $exeName = "MahfadhaPro.exe"
          if (-not (Test-Path "installer\flutter-release\$exeName")) {
            Write-Host "WARNING: $exeName not found. Looking for available exe files..."
            $exeFiles = Get-ChildItem "installer\flutter-release\*.exe"
            if ($exeFiles.Count -gt 0) {
              $actualExe = $exeFiles[0].Name
              Write-Host "Found exe: $actualExe — renaming to $exeName"
              Rename-Item "installer\flutter-release\$actualExe" $exeName
            } else {
              Write-Host "ERROR: No exe files found in flutter-release!"
              exit 1
            }
          }

          Write-Host "Copying CLI bridge..."
          Copy-Item "cli-bridge\dist\mahfadha_bridge.exe" "installer\"
          Write-Host "Installer files ready!"

      - name: Build Single Installer EXE with Inno Setup
        run: |
          iscc "installer\setup.iss"

      - name: Upload Single Installer EXE
        uses: actions/upload-artifact@v4
        with:
          name: Mahfadha-Pro-Installer
          path: installer-output\CipherVaultPro_Setup.exe
