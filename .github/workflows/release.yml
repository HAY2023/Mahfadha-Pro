name: Build and Release Mahfadha Pro

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10
  workflow_dispatch: # Allow manual triggering

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install PyInstaller & Build CLI Bridge
        run: |
          cd cli-bridge
          python -m pip install --upgrade pip
          pip install pyinstaller pyserial
          pyinstaller --onefile --name mahfadha_bridge mahfadha_bridge.py
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          
      - name: Build Flutter App
        run: |
          cd app
          flutter create --platforms windows .
          flutter pub get
          flutter build windows --release

      - name: Prepare Release Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "Mahfadha-Pro-Release"

          # Find the Release directory
          $releaseDir = $null
          $x64Path = "app\build\windows\x64\runner\Release"
          $legacyPath = "app\build\windows\runner\Release"

          if (Test-Path $x64Path) {
            $releaseDir = $x64Path
          } elseif (Test-Path $legacyPath) {
            $releaseDir = $legacyPath
          } else {
            Write-Host "ERROR: Could not find Flutter release directory!"
            exit 1
          }

          Write-Host "Found Flutter release at: $releaseDir"
          Copy-Item "$releaseDir\*" "Mahfadha-Pro-Release\" -Recurse

          # Verify/rename exe
          $exeName = "mahfadha_companion.exe"
          if (-not (Test-Path "Mahfadha-Pro-Release\$exeName")) {
            $exeFiles = Get-ChildItem "Mahfadha-Pro-Release\*.exe"
            if ($exeFiles.Count -gt 0) {
              $actualExe = $exeFiles[0].Name
              Write-Host "Renaming $actualExe -> $exeName"
              Rename-Item "Mahfadha-Pro-Release\$actualExe" $exeName
            }
          }

          # Copy CLI bridge
          Copy-Item "cli-bridge\dist\mahfadha_bridge.exe" "Mahfadha-Pro-Release\"
          
          # Create zip
          Compress-Archive -Path "Mahfadha-Pro-Release\*" -DestinationPath "Mahfadha-Pro-Windows.zip"
          Write-Host "Release package created!"

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: Mahfadha-Pro-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
