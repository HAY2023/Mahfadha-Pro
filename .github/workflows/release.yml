name: Build and Release Mahfadha Pro

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10
  workflow_dispatch: # Allow manual triggering

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install PyInstaller & Build CLI Bridge
        run: |
          cd cli-bridge
          python -m pip install --upgrade pip
          pip install pyinstaller
          # Add any other requirements here (e.g., pyserial, cryptography)
          pyinstaller --onefile --name mahfadha_bridge mahfadha_bridge.py
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Build Flutter App
        run: |
          cd app
          # Ensure windows support is enabled
          flutter create --platforms windows .
          flutter pub get
          flutter build windows --release

      - name: Prepare Release Package
        run: |
          mkdir Mahfadha-Pro-Release
          # Copy Flutter App
          cp -r app/build/windows/x64/runner/Release/* Mahfadha-Pro-Release/
          # Copy Python CLI Bridge
          cp cli-bridge/dist/mahfadha_bridge.exe Mahfadha-Pro-Release/
          # Compress to Zip
          Compress-Archive -Path Mahfadha-Pro-Release\* -DestinationPath Mahfadha-Pro-Windows.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: Mahfadha-Pro-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
