name: Build and Release Mahfadha Pro

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Install bridge build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pyserial platformio

      - name: Build CLI bridge
        run: |
          cd cli-bridge
          pyinstaller --onefile --name mahfadha_bridge mahfadha_bridge.py

      - name: Build Windows application
        run: |
          cd app
          flutter create --platforms windows .
          flutter pub get
          flutter build windows --release

      - name: Build firmware binary
        run: |
          cd firmware
          pio run

      - name: Prepare release assets
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          New-Item -ItemType Directory -Force "release-assets" | Out-Null
          New-Item -ItemType Directory -Force "release-assets\portable" | Out-Null

          $releaseTag = if ($env:GITHUB_REF_TYPE -eq "tag") {
            $env:GITHUB_REF_NAME
          } else {
            "manual-$($env:GITHUB_RUN_NUMBER)"
          }

          $releaseUrl = if ($env:GITHUB_REF_TYPE -eq "tag") {
            "$($env:GITHUB_SERVER_URL)/$($env:GITHUB_REPOSITORY)/releases/tag/$releaseTag"
          } else {
            "$($env:GITHUB_SERVER_URL)/$($env:GITHUB_REPOSITORY)/actions/runs/$($env:GITHUB_RUN_ID)"
          }

          $releaseDir = $null
          $x64Path = "app\build\windows\x64\runner\Release"
          $legacyPath = "app\build\windows\runner\Release"

          if (Test-Path $x64Path) {
            $releaseDir = $x64Path
          } elseif (Test-Path $legacyPath) {
            $releaseDir = $legacyPath
          } else {
            Write-Host "ERROR: Could not find Flutter release directory."
            exit 1
          }

          Copy-Item "$releaseDir\*" "release-assets\portable\" -Recurse -Force

          $rawExe = Get-ChildItem "release-assets\portable\*.exe" | Select-Object -First 1
          if (-not $rawExe) {
            Write-Host "ERROR: No application exe found in portable output."
            exit 1
          }

          if ($rawExe.Name -ne "CipherVaultPro.exe") {
            Rename-Item $rawExe.FullName "CipherVaultPro.exe"
          }

          Copy-Item "cli-bridge\dist\mahfadha_bridge.exe" "release-assets\portable\" -Force

          Compress-Archive `
            -Path "release-assets\portable\*" `
            -DestinationPath "release-assets\CipherVault-Pro-Windows.zip" `
            -Force

          New-Item -ItemType Directory -Force "installer\flutter-release" | Out-Null
          Copy-Item "release-assets\portable\*" "installer\flutter-release\" -Recurse -Force
          Copy-Item "cli-bridge\dist\mahfadha_bridge.exe" "installer\" -Force

          iscc "installer\setup.iss"
          Copy-Item "installer-output\CipherVaultPro_Setup.exe" "release-assets\" -Force

          $firmwarePath = "firmware\.pio\build\esp32-s3-devkitc-1\firmware.bin"
          if (-not (Test-Path $firmwarePath)) {
            Write-Host "ERROR: firmware.bin not found."
            exit 1
          }
          Copy-Item $firmwarePath "release-assets\firmware.bin" -Force

          $filesForHashes = @(
            "release-assets\CipherVaultPro_Setup.exe",
            "release-assets\CipherVault-Pro-Windows.zip",
            "release-assets\firmware.bin"
          )

          $hashMap = @{}
          $hashLines = @()
          foreach ($file in $filesForHashes) {
            $hash = (Get-FileHash $file -Algorithm SHA256).Hash.ToLower()
            $name = Split-Path $file -Leaf
            $hashMap[$name] = $hash
            $hashLines += "${name}: ${hash}"
          }

          Set-Content -Path "release-assets\SHA256SUMS.txt" -Value $hashLines

          $manifest = @{
            schema_version = 1
            repository = $env:GITHUB_REPOSITORY
            version = $releaseTag
            published_at = (Get-Date).ToUniversalTime().ToString("o")
            release_url = $releaseUrl
            assets = @{
              app = @{
                name = "CipherVaultPro_Setup.exe"
                download_url = "$($env:GITHUB_SERVER_URL)/$($env:GITHUB_REPOSITORY)/releases/download/$releaseTag/CipherVaultPro_Setup.exe"
                sha256 = $hashMap["CipherVaultPro_Setup.exe"]
                size = (Get-Item "release-assets\CipherVaultPro_Setup.exe").Length
              }
              portable = @{
                name = "CipherVault-Pro-Windows.zip"
                download_url = "$($env:GITHUB_SERVER_URL)/$($env:GITHUB_REPOSITORY)/releases/download/$releaseTag/CipherVault-Pro-Windows.zip"
                sha256 = $hashMap["CipherVault-Pro-Windows.zip"]
                size = (Get-Item "release-assets\CipherVault-Pro-Windows.zip").Length
              }
              firmware = @{
                name = "firmware.bin"
                download_url = "$($env:GITHUB_SERVER_URL)/$($env:GITHUB_REPOSITORY)/releases/download/$releaseTag/firmware.bin"
                sha256 = $hashMap["firmware.bin"]
                size = (Get-Item "release-assets\firmware.bin").Length
              }
            }
          }

          $manifest | ConvertTo-Json -Depth 10 | Set-Content -Path "release-assets\latest.json" -Encoding UTF8

          $releaseNotes = @()
          $releaseNotes += "Automated build for CipherVault Pro."
          $releaseNotes += ""
          $releaseNotes += "Release assets:"
          $releaseNotes += "- CipherVaultPro_Setup.exe"
          $releaseNotes += "- CipherVault-Pro-Windows.zip"
          $releaseNotes += "- firmware.bin"
          $releaseNotes += "- latest.json"
          $releaseNotes += ""
          $releaseNotes += "Manifest:"
          $releaseNotes += "- latest.json contains the signed asset metadata used by the desktop updater."
          $releaseNotes += ""
          $releaseNotes += "SHA-256:"
          $releaseNotes += $hashLines

          Set-Content -Path "release-assets\release-notes.md" -Value $releaseNotes

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CipherVault-Pro-Release
          path: |
            release-assets/CipherVaultPro_Setup.exe
            release-assets/CipherVault-Pro-Windows.zip
            release-assets/firmware.bin
            release-assets/latest.json
            release-assets/SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release-assets/CipherVaultPro_Setup.exe
            release-assets/CipherVault-Pro-Windows.zip
            release-assets/firmware.bin
            release-assets/latest.json
            release-assets/SHA256SUMS.txt
          body_path: release-assets/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
