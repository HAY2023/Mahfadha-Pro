name: mahfadha_companion
description: Companion app for Mahfadha Pro Hardware Password Manager
publish_to: 'none'
version: 1.0.8+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_libserialport: ^0.3.0
  file_picker: ^8.3.2
  csv: ^6.0.0
  http: ^1.2.2
  crypto: ^3.0.6
  provider: ^6.1.2
  window_manager: ^0.5.1
  tray_manager: ^0.5.2
  windows_single_instance: ^1.1.0
  google_fonts: ^6.2.1
  animate_do: ^3.3.4
  lottie: ^3.1.0
  package_info_plus: ^8.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/tray/
